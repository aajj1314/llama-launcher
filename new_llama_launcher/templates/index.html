<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llama Launcher v4.0 - 用户友好版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
        }

        .section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.4em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .model-list {
            max-height: 200px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
        }

        .model-item {
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid #eee;
        }

        .model-item:last-child {
            border-bottom: none;
        }

        .model-item:hover {
            background: #f0f3ff;
        }

        .model-item.selected {
            background: #667eea;
            color: white;
        }

        .model-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .model-size {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(235, 51, 73, 0.4);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-warning:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #5a6268;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .status-stopped {
            background: #e0e0e0;
            color: #666;
        }

        .status-starting, .status-stopping {
            background: #ffecd2;
            color: #d35400;
        }

        .status-running {
            background: #d4edda;
            color: #155724;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }

        .log-container {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            font-family: "Consolas", "Monaco", monospace;
            font-size: 0.9em;
        }

        .log-container pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .process-info {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .process-info p {
            margin: 8px 0;
            color: #555;
        }

        .process-info strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Llama Launcher v4.0</h1>
            <p>用户友好的 llama.cpp 模型启动器 - 简单、易用、高效</p>
        </div>

        <div id="alertContainer"></div>

        <div class="main-content">
            <div>
                <!-- 模型选择区域 -->
                <div class="section">
                    <h2>📁 模型选择</h2>
                    <div class="button-group" style="margin-bottom: 15px;">
                        <button class="btn btn-secondary" onclick="scanModels()">🔄 刷新模型列表</button>
                    </div>
                    <div class="model-list" id="modelList">
                        <div style="padding: 20px; text-align: center; color: #999;">加载中...</div>
                    </div>
                </div>

                <!-- 运行配置区域 -->
                <div class="section">
                    <h2>⚙️ 运行配置</h2>
                    <div class="form-group">
                        <label>运行模式</label>
                        <select id="runMode">
                            <option value="cli">CLI - 交互式</option>
                            <option value="server">Server - API 服务</option>
                            <option value="embedding">Embedding - 向量生成</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>上下文大小</label>
                        <select id="contextSize">
                            <option value="4096">4K</option>
                            <option value="8192">8K</option>
                            <option value="16384">16K</option>
                            <option value="32768">32K</option>
                            <option value="65536">64K</option>
                            <option value="131072">128K</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>GPU 层数 (ngl)</label>
                        <select id="ngl">
                            <option value="0">0</option>
                            <option value="33">33</option>
                            <option value="66">66</option>
                            <option value="99">99</option>
                            <option value="999">999</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>端口 (Server 模式)</label>
                        <input type="number" id="port" value="8000" min="1" max="65535">
                    </div>

                    <div class="button-group">
                        <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
                    </div>
                </div>
            </div>

            <div>
                <!-- 路径配置区域 -->
                <div class="section">
                    <h2>📂 路径配置</h2>
                    <div class="form-group">
                        <label>llama.cpp 路径</label>
                        <input type="text" id="llamaCppPath" placeholder="/path/to/llama.cpp">
                    </div>
                    <div class="button-group">
                        <button class="btn btn-primary" onclick="updatePath()">📁 更新路径</button>
                    </div>
                </div>

                <!-- 进程控制区域 -->
                <div class="section">
                    <h2>🎮 进程控制</h2>

                    <div style="margin-bottom: 15px;">
                        <span>当前状态: </span>
                        <span class="status-badge" id="statusBadge">stopped</span>
                    </div>

                    <div class="process-info" id="processInfo" style="display: none;">
                        <p><strong>运行模式:</strong> <span id="infoMode">-</span></p>
                        <p><strong>模型:</strong> <span id="infoModel">-</span></p>
                        <p><strong>PID:</strong> <span id="infoPid">-</span></p>
                        <p><strong>启动时间:</strong> <span id="infoStartTime">-</span></p>
                    </div>

                    <div id="errorMessage" class="alert alert-error" style="display: none;"></div>

                    <div class="button-group">
                        <button class="btn btn-success" id="startBtn" onclick="startProcess()">▶️ 启动</button>
                        <button class="btn btn-danger" id="stopBtn" onclick="stopProcess()" disabled>⏹️ 停止</button>
                        <button class="btn btn-warning" id="restartBtn" onclick="restartProcess()" disabled>🔄 重启</button>
                    </div>
                </div>

                <!-- 日志显示区域 -->
                <div class="section">
                    <h2>📜 运行日志</h2>
                    <div class="log-container">
                        <pre id="logContent">等待启动...</pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局状态变量 - 用户输入不会自动重置
        let localState = {
            models: [],
            selectedModel: null,
            config: {},
            process: {}
        };

        // 显示消息
        function showAlert(message, type = 'info') {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} show`;
            alert.textContent = message;
            container.appendChild(alert);

            setTimeout(() => {
                alert.classList.remove('show');
                setTimeout(() => alert.remove(), 300);
            }, 3000);
        }

        // 从服务器获取状态
        async function fetchState() {
            try {
                const response = await fetch('/api/state');
                const data = await response.json();

                // 更新本地状态
                localState.models = data.models || [];
                localState.selectedModel = data.selected_model || null;
                localState.config = data.config || {};
                localState.process = data.process || {};

                updateUI();
            } catch (error) {
                console.error('获取状态失败:', error);
            }
        }

        // 更新UI
        function updateUI() {
            updateModelList();
            updateConfigFields();
            updateProcessInfo();
        }

        // 更新模型列表
        function updateModelList() {
            const container = document.getElementById('modelList');

            if (localState.models.length === 0) {
                container.innerHTML = `
                    <div style="padding: 20px; text-align: center; color: #999;">
                        没有找到模型<br>
                        <small style="margin-top: 10px; display: block;">请确保模型在 models 目录中</small>
                    </div>
                `;
                return;
            }

            container.innerHTML = localState.models.map(model => `
                <div class="model-item ${model.name === localState.selectedModel ? 'selected' : ''}"
                     onclick="selectModel('${model.name}')">
                    <div class="model-name">${model.name}</div>
                    <div class="model-size">${model.size_formatted}</div>
                </div>
            `).join('');
        }

        // 更新配置字段
        function updateConfigFields() {
            const config = localState.config;

            // 只在页面初始化时更新字段，保留用户当前输入
            // 避免频繁的状态刷新覆盖用户输入
            if (window.configInitialized) {
                return;
            }

            // 初始化配置字段
            if (config.run_mode) {
                document.getElementById('runMode').value = config.run_mode;
            }

            if (config.context_size) {
                document.getElementById('contextSize').value = config.context_size.toString();
            }

            if (config.ngl !== undefined) {
                document.getElementById('ngl').value = config.ngl.toString();
            }

            if (config.port) {
                document.getElementById('port').value = config.port.toString();
            }

            if (config.llama_cpp_path) {
                document.getElementById('llamaCppPath').value = config.llama_cpp_path;
            }

            // 标记配置已初始化
            window.configInitialized = true;
        }

        // 更新进程信息
        function updateProcessInfo() {
            const process = localState.process;

            // 更新状态徽章
            const badge = document.getElementById('statusBadge');
            badge.textContent = process.status || 'stopped';
            badge.className = 'status-badge';

            if (process.status) {
                badge.classList.add(`status-${process.status}`);
            }

            // 更新进程信息显示
            const infoDiv = document.getElementById('processInfo');
            const errorDiv = document.getElementById('errorMessage');

            if (process.status === 'error' && process.error_message) {
                errorDiv.textContent = process.error_message;
                errorDiv.style.display = 'block';
                infoDiv.style.display = 'none';
            } else {
                errorDiv.style.display = 'none';

                if (process.model_name) {
                    infoDiv.style.display = 'block';
                    document.getElementById('infoMode').textContent = process.mode || '-';
                    document.getElementById('infoModel').textContent = process.model_name || '-';
                    document.getElementById('infoPid').textContent = process.pid || '-';
                    document.getElementById('infoStartTime').textContent =
                        process.start_time ? new Date(process.start_time * 1000).toLocaleString('zh-CN') : '-';
                } else {
                    infoDiv.style.display = 'none';
                }
            }

            // 更新按钮状态
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const restartBtn = document.getElementById('restartBtn');

            const isRunning = process.status === 'running';
            const isTransitioning = process.status === 'starting' || process.status === 'stopping';

            startBtn.disabled = isRunning || isTransitioning || !localState.selectedModel;
            stopBtn.disabled = !isRunning && !isTransitioning;
            restartBtn.disabled = !isRunning;
        }

        // 选择模型
        function selectModel(modelName) {
            localState.selectedModel = modelName;
            updateModelList();
            // 不立即调用API，由用户决定是否启动
        }

        // 扫描模型
        async function scanModels() {
            try {
                const response = await fetch('/api/models/scan', { method: 'POST' });
                const result = await response.json();

                if (result.success) {
                    showAlert('模型列表已刷新！', 'success');
                    await fetchState();
                }
            } catch (error) {
                showAlert('刷新模型失败: ' + error.message, 'error');
            }
        }

        // 保存配置
        async function saveConfig() {
            try {
                const config = {
                    run_mode: document.getElementById('runMode').value,
                    context_size: parseInt(document.getElementById('contextSize').value),
                    ngl: parseInt(document.getElementById('ngl').value),
                    port: parseInt(document.getElementById('port').value)
                };

                const response = await fetch('/api/config/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('配置已保存！', 'success');
                    localState.config = result.config;
                    // 重置初始化标志，以便下次更新时反映保存的值
                    window.configInitialized = false;
                    updateConfigFields();
                }
            } catch (error) {
                showAlert('保存配置失败: ' + error.message, 'error');
            }
        }

        // 更新路径
        async function updatePath() {
            try {
                const path = document.getElementById('llamaCppPath').value;

                if (!path) {
                    showAlert('请输入路径！', 'error');
                    return;
                }

                const response = await fetch('/api/path/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: path })
                });

                if (response.ok) {
                    const result = await response.json();
                    if (result.success) {
                        showAlert('路径已更新！', 'success');
                        await fetchState();
                        // 重置初始化标志，以便更新配置字段
                        window.configInitialized = false;
                        updateConfigFields();
                    }
                } else {
                    const errorData = await response.json();
                    showAlert('更新路径失败: ' + (errorData.detail || '未知错误'), 'error');
                }
            } catch (error) {
                showAlert('更新路径失败: ' + error.message, 'error');
            }
        }

        // 启动进程
        async function startProcess() {
            try {
                const mode = document.getElementById('runMode').value;
                const modelName = localState.selectedModel;

                if (!modelName) {
                    showAlert('请先选择一个模型！', 'error');
                    return;
                }

                // 先保存配置
                await saveConfig();

                const response = await fetch('/api/process/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mode: mode,
                        model_name: modelName
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    if (result.success) {
                        showAlert('启动成功！', 'success');
                        await fetchState();
                    }
                } else {
                    const errorData = await response.json();
                    showAlert('启动失败: ' + (errorData.detail || '未知错误'), 'error');
                    await fetchState();
                }
            } catch (error) {
                showAlert('启动失败: ' + error.message, 'error');
            }
        }

        // 停止进程
        async function stopProcess() {
            try {
                const response = await fetch('/api/process/stop', { method: 'POST' });
                const result = await response.json();

                if (result.success) {
                    showAlert('已停止！', 'success');
                    await fetchState();
                }
            } catch (error) {
                showAlert('停止失败: ' + error.message, 'error');
            }
        }

        // 重启进程
        async function restartProcess() {
            try {
                const response = await fetch('/api/process/restart', { method: 'POST' });
                const result = await response.json();

                if (result.success) {
                    showAlert('已重启！', 'success');
                    await fetchState();
                }
            } catch (error) {
                showAlert('重启失败: ' + error.message, 'error');
            }
        }

        // 获取日志
        async function fetchLogs() {
            try {
                const response = await fetch('/api/logs');
                const result = await response.json();

                const logContent = document.getElementById('logContent');
                if (result.logs && result.logs.length > 0) {
                    logContent.textContent = result.logs.join('');
                    // 滚动到底部
                    logContent.parentElement.scrollTop = logContent.parentElement.scrollHeight;
                } else if (localState.process.status === 'running') {
                    logContent.textContent = '等待输出...';
                } else {
                    logContent.textContent = '等待启动...';
                }
            } catch (error) {
                console.error('获取日志失败:', error);
            }
        }

        // 初始化
        async function init() {
            await fetchState();

            // 定期刷新状态
            setInterval(fetchState, 1000);

            // 定期刷新日志
            setInterval(fetchLogs, 500);

            showAlert('Llama Launcher 已就绪！', 'success');
        }

        // 页面加载时初始化
        init();
    </script>
</body>
</html>
